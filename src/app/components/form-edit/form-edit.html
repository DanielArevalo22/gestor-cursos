<div class="container py-4 form-wrapper">
  <div class="card border-primary border-opacity-25 shadow-sm form-card">
    <h1 class="m-4 fs-4 fw-semibold text-primary-emphasis mb-0">Editar curso</h1>
    <p class="text-muted px-4 mb-0 form-subtitle">ID: {{ course.idCo }}</p>
    <div class="card-body px-4 py-4">
      <div class="mb-3">
        <label class="form-label fw-medium text-primary-emphasis form-label-sm">Nombre</label>
        <input type="text" class="form-control" [(ngModel)]="name" />
      </div>
      <div class="mb-3">
        <label class="form-label fw-medium text-primary-emphasis form-label-sm">Docente</label>
        <input type="text" class="form-control" [(ngModel)]="teachName" />
      </div>
      <div class="mb-3">
        <label class="form-label fw-medium text-primary-emphasis form-label-sm">Cupos</label>
        <input type="number" class="form-control" min="1" [(ngModel)]="slots" />
      </div>
      <p class="text-muted mb-3 form-message">Inscritos: {{ course.takenSlots }} / {{ course.slots }}</p>
      <p *ngIf="loadError" class="text-danger mb-3 form-message">{{ loadError }}</p>
      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-outline-secondary btn-sm px-4" (click)="sendCloseModal()">
          Cancelar
        </button>
        <button type="button" class="btn btn-success btn-sm px-4" (click)="saveCourse()">
          <i class="fa-regular fa-pen-to-square"></i> Guardar
        </button>
      </div>
    </div>
  </div>
</div>
