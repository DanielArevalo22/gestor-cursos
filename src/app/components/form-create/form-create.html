<div class="container py-4 form-wrapper">
  <div class="card border-primary border-opacity-25 shadow-sm form-card">
    <h1 class="m-4 fs-4 fw-semibold text-primary-emphasis mb-0">Crear curso</h1>
    <div class="card-body px-4 py-4">
      <div class="mb-3">
        <label class="form-label fw-medium text-primary-emphasis form-label-sm">Nombre</label>
        <input type="text" class="form-control" [(ngModel)]="name" />
      </div>
      <div class="mb-3">
        <label class="form-label fw-medium text-primary-emphasis form-label-sm">Docente</label>
        <input type="text" class="form-control" [(ngModel)]="teachName" />
      </div>
      <div class="mb-3">
        <label class="form-label fw-medium text-primary-emphasis form-label-sm">Cupos</label>
        <input type="number" class="form-control" min="1" [(ngModel)]="slots" />
      </div>
      <p *ngIf="saveError" class="text-danger mb-3 form-message">{{ saveError }}</p>
      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-outline-danger btn-sm px-4" data-bs-dismiss="modal" (click)="sendCloseModal()">
          Cancelar
        </button>
        <button type="button" class="btn btn-primary btn-sm px-4" (click)="createCourse()">
          <i class="fa-solid fa-plus me-1"></i> Crear curso
        </button>
      </div>
    </div>
  </div>
</div>
